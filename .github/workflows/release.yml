# ============================================================================
# release.yml — tag-driven, multi-platform release for `content-addressable`.
#
# WHAT THIS DOES
#   On a version tag (`v*`) it builds the full abi3 wheel matrix with
#   PyO3/maturin-action, then publishes:
#     - the wheels + sdist to PyPI via Trusted Publishing (OIDC — NO token), and
#     - the CORE crate to crates.io via `cargo publish` (the py crate is
#       `publish = false` and never goes to crates.io).
#   It retires the deprecated, laptop-bound `maturin upload` path (issue #14).
#
# HOOK PARITY (read this before wondering why it's not in .githooks/pre-push)
#   This workflow is *tag-triggered and publish-only*. It is NOT a push-gate:
#   it never runs on `push`/`pull_request` to `main`, so it is NOT — and must
#   not be — mirrored in .githooks/pre-push. That hook mirrors the CI *gate*
#   (.github/workflows/ci.yml: fmt/clippy/test/doc/leaf). A release pipeline has
#   nothing to enforce on every push; mirroring it would just slow pushes down
#   and try to publish from a laptop, which is exactly what issue #14 retires.
#   This is the same documented-exception pattern the `python` and `msrv` CI
#   jobs already use (see the ci.yml / pre-push headers). Keeping it OUT of the
#   hook is the correct, honest parity story — there is no gate here to mirror.
#
# PRIOR ART
#   The wheel matrix and abi3 conventions below are lifted from nessie-store,
#   which already ships multi-platform abi3 wheels via PyO3/maturin-action
#   (macOS universal2 / Linux x86_64 + aarch64 / Windows). Reused rather than
#   reinvented (issue #14). Lessons carried over: abi3-py39 ⇒ ONE wheel per
#   target (not per Python version); PyPI throttles *new project* names, so the
#   PyPI and crates.io publishes are independent jobs and a partial failure of
#   one can be re-run without redoing the other.
#
# ----------------------------------------------------------------------------
# ONE-TIME MAINTAINER SETUP (must be done before the first real `v*` tag)
#
#   1. PyPI Trusted Publisher (OIDC — no stored token). On PyPI, add a
#      "pending publisher" (Account → Publishing) for project
#      `content-addressable` with EXACTLY these values:
#
#          PyPI Project Name:  content-addressable
#          Owner:              hartsock
#          Repository name:    content-addressable
#          Workflow name:      release.yml
#          Environment name:   pypi
#
#      The filename `release.yml` and the environment `pypi` are load-bearing —
#      they must match the `publish-pypi` job below. Do NOT rename this file or
#      the environment without updating the Trusted Publisher registration.
#
#   2. crates.io token. crates.io has no OIDC trusted publishing yet, so the
#      core crate publishes with a token. Create a scoped token at
#      https://crates.io/settings/tokens (scope: publish-update for
#      `content-addressable`) and store it as the repository secret
#      `CARGO_REGISTRY_TOKEN` (Settings → Secrets and variables → Actions).
#
#   3. (Recommended) Create a GitHub environment named `pypi` (Settings →
#      Environments) and add required reviewers / a tag protection rule so a
#      human gate sits in front of the irreversible PyPI publish.
#
# See RELEASING.md for the full runbook (version bump → tag → push).
# ============================================================================
name: release

on:
  push:
    tags:
      - "v*" # e.g. v0.1.0-rc1, v0.1.0
  # Manual dry run: builds the full wheel matrix + sdist and runs the
  # non-publishing checks (twine check, cargo publish --dry-run) so the matrix
  # can be validated WITHOUT touching either registry. The publish jobs below
  # are gated on `github.event_name == 'push'`, so a workflow_dispatch run never
  # publishes anything.
  workflow_dispatch:

permissions: {} # least privilege at the top; jobs opt into what they need.

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------
  # verify — the version-drift seam. The repo carries TWO version strings that
  # MUST stay in lockstep and MUST match the tag:
  #     Cargo.toml      version = "0.1.0-rc1"   (SemVer, crates.io)
  #     pyproject.toml  version = "0.1.0rc1"    (PEP 440, PyPI)
  # This job derives the expected spellings from the tag and fails the whole
  # release if either file disagrees. On workflow_dispatch (no tag) it is a
  # no-op pass so dry runs aren't blocked. (AC: verify job.)
  # --------------------------------------------------------------------------
  verify:
    name: verify (tag ↔ Cargo.toml ↔ pyproject.toml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assert tag matches both version strings
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"           # e.g. v0.1.0-rc1
          ver="${tag#v}"                      # strip leading 'v' -> 0.1.0-rc1
          # SemVer spelling (Cargo.toml) keeps the hyphen: 0.1.0-rc1.
          semver="${ver}"
          # PEP 440 spelling (pyproject.toml) drops the hyphen before the
          # pre-release segment: 0.1.0-rc1 -> 0.1.0rc1, 0.1.0-alpha.1 ->
          # 0.1.0alpha.1, etc. A plain release tag (0.1.0) is unchanged.
          pep440="${ver/-/}"

          cargo_ver="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')"
          py_ver="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"

          echo "tag=${tag}"
          echo "expected SemVer (Cargo.toml)   = ${semver}   actual = ${cargo_ver}"
          echo "expected PEP 440 (pyproject)   = ${pep440}   actual = ${py_ver}"

          fail=0
          if [ "${cargo_ver}" != "${semver}" ]; then
            echo "::error::Cargo.toml version '${cargo_ver}' != tag-derived SemVer '${semver}'"
            fail=1
          fi
          if [ "${py_ver}" != "${pep440}" ]; then
            echo "::error::pyproject.toml version '${py_ver}' != tag-derived PEP 440 '${pep440}'"
            fail=1
          fi
          exit "${fail}"
      - name: dry-run note (no tag to verify)
        if: github.event_name != 'push'
        run: echo "workflow_dispatch dry run — skipping tag/version verification."

  # --------------------------------------------------------------------------
  # build-wheels — abi3 wheels across the target matrix. abi3-py39 (set in
  # content-addressable-py/Cargo.toml) means ONE cp39-abi3 wheel per target
  # covers CPython >= 3.9, so the matrix is platform×arch, NOT
  # platform×arch×python. Each wheel is uploaded as an artifact for the publish
  # jobs to collect. (AC: maturin-action wheels for the four targets.)
  # --------------------------------------------------------------------------
  build-wheels:
    name: wheels (${{ matrix.platform.target }} on ${{ matrix.platform.runner }})
    needs: verify
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
            args: --release --out dist --manifest-path content-addressable-py/Cargo.toml
            manylinux: auto
          - runner: ubuntu-latest
            target: aarch64
            # aarch64 Linux is cross-built inside maturin-action's manylinux
            # container (zig/cross), not on a native arm runner.
            args: --release --out dist --manifest-path content-addressable-py/Cargo.toml
            manylinux: auto
          - runner: macos-14
            # universal2 = a single wheel carrying both x86_64 and arm64 macOS
            # slices, covering Intel and Apple Silicon from one artifact.
            target: universal2-apple-darwin
            args: --release --out dist --manifest-path content-addressable-py/Cargo.toml --target universal2-apple-darwin
            manylinux: ""
          - runner: windows-latest
            target: x64
            args: --release --out dist --manifest-path content-addressable-py/Cargo.toml
            manylinux: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.args }}
          # `auto` on Linux selects a manylinux image; empty elsewhere.
          manylinux: ${{ matrix.platform.manylinux }}
          # QEMU emulation for the cross (aarch64) Linux build when needed.
          sccache: "true"
      - name: twine check the wheels
        shell: bash
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*
      - name: upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist/*.whl
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # build-sdist — the source distribution, built once. PyPI needs an sdist so
  # `pip install` can fall back to a from-source build on any platform/arch the
  # wheel matrix doesn't cover.
  # --------------------------------------------------------------------------
  build-sdist:
    name: sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path content-addressable-py/Cargo.toml
      - name: twine check the sdist
        shell: bash
        run: |
          python -m pip install --upgrade pip twine
          twine check dist/*
      - name: upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # --------------------------------------------------------------------------
  # publish-pypi — Trusted Publishing (OIDC). NO password/token: GitHub mints a
  # short-lived OIDC identity per run that PyPI trusts via the pending-publisher
  # registration (owner/repo/workflow/environment above). Runs ONLY on a real
  # tag push (never on workflow_dispatch). Independent of the crates.io job, so
  # a PyPI rate-limit can be re-run without re-publishing the crate. (AC: OIDC,
  # id-token: write, environment `pypi`, no token, push-gated.)
  # --------------------------------------------------------------------------
  publish-pypi:
    name: publish to PyPI (Trusted Publishing)
    if: github.event_name == 'push'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # REQUIRED for OIDC Trusted Publishing. No secrets used.
    steps:
      - name: download all wheel + sdist artifacts
        uses: actions/download-artifact@v4
        with:
          # Every wheels-* artifact plus the sdist; flattened into dist/.
          path: dist
          merge-multiple: true
      - name: list artifacts to publish
        run: ls -la dist/
      - name: publish to PyPI
        # No `password:` / `with: token:` — Trusted Publishing supplies the
        # credential via the OIDC token minted by `id-token: write` above.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  # --------------------------------------------------------------------------
  # publish-crate — the CORE crate to crates.io. The py crate is
  # `publish = false`, so `-p content-addressable` publishes the leaf core only
  # and never the bindings. crates.io has no OIDC yet, so this uses the
  # `CARGO_REGISTRY_TOKEN` secret. `--locked` is safe because Cargo.lock is
  # COMMITTED for this crate (issue #9, gate item #10) — the build resolves to
  # the pinned lockfile, not a fresh resolve. Runs ONLY on a real tag push;
  # independent of the PyPI job. (AC: cargo publish core via token, py stays
  # publish=false, independent job, push-gated.)
  # --------------------------------------------------------------------------
  publish-crate:
    name: publish core crate to crates.io
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish (core crate only)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p content-addressable --locked

  # --------------------------------------------------------------------------
  # dry-run-checks — workflow_dispatch only. Proves the crate-publish path
  # (`cargo publish --dry-run`) without touching crates.io, so the manual dry
  # run exercises BOTH the wheel matrix (above, via twine check) AND the crate
  # packaging before the first real tag. Never runs on a tag push.
  # --------------------------------------------------------------------------
  dry-run-checks:
    name: dry-run checks (no publish)
    if: github.event_name == 'workflow_dispatch'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish --dry-run (core crate)
        run: cargo publish -p content-addressable --locked --dry-run
      - name: summary
        run: echo "Dry run complete — wheels + sdist built and checked; crate packaged. Nothing published."
