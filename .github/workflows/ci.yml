# HOOK PARITY: the cargo fmt/clippy/test/doc jobs AND the `leaf-deps` job are
# mirrored by .githooks/pre-push. When editing those, update the push hook to
# match. The
# build/test/clippy jobs run with `--all-features` so the default-OFF `merkle`
# feature (src/merkle.rs / MerkleNode) is actually compiled and tested; the
# `test` job additionally runs a plain `cargo test` to keep the default-feature
# surface green and to prove `merkle` stays off by default. The `doc` job runs
# rustdoc with `-D warnings` (`--all-features`) so a broken intra-doc link fails
# CI — API-surface hygiene (issue #9); it is mirrored in the hook (rustdoc is
# cheap). The `leaf-deps` job runs scripts/check-leaf-deps.sh, which asserts the
# published core crate's dependency closure is registry-only (no path/git deps),
# keeping it a true leaf (issue #13); it reads only `cargo metadata` (no build),
# so it is fast and offline and is mirrored in the hook (true parity).
#
# CI-ONLY jobs (documented exceptions, NOT in the hook):
#   - `msrv` pins `dtolnay/rust-toolchain@1.85` and runs build+test so a
#     transitive dep can't silently raise the real MSRV floor above the declared
#     `rust-version = "1.85"` (issue #9, gate item #10). Installing a second
#     toolchain on every push is too heavy for a fast hook, so it is CI-only —
#     the same rationale as the `python` job. The declared floor still lives in
#     Cargo.toml, which the hook respects implicitly.
#   - `python` (maturin + pytest for the PyO3 face) — building the extension
#     module is too heavy for a fast pre-push hook (the pattern kyln uses to keep
#     its p4d suite out of the hook).
# The pre-push hook records both exceptions in its header.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (default features — proves merkle stays off)
        run: cargo test
      - name: cargo test --all-features (exercises the merkle feature)
        run: cargo test --all-features

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin the declared MSRV floor. If a transitive dependency starts requiring
      # a newer Rust, THIS job fails — surfacing an MSRV bump as an intentional,
      # SemVer-relevant change instead of a silent drift (issue #9, gate #10).
      # These commands resolve to `default-members = ["."]` (the published core
      # crate only); the PyO3 `content-addressable-py` member is NOT built here.
      # Its PyO3/pythonize stack (pyo3 0.29) needs ~1.83, below this 1.85 floor,
      # and it is a maturin-built wheel — not the crates.io LIBRARY whose contract
      # this 1.85 floor is. Keep this job scoped to the core crate.
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (MSRV 1.85, core crate)
        run: cargo build --all-targets --all-features
      - name: cargo test (MSRV 1.85, core crate)
        run: cargo test --all-features

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: doc (intra-doc links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # `-D warnings` turns broken intra-doc links into a hard CI failure so doc
      # rot can't return (issue #9 — public API surface hygiene).
      - name: cargo doc (deny warnings)
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt -- --check

  leaf-deps:
    name: leaf-deps (published core is a true leaf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # No build cache and no compilation: the guard only reads `cargo
      # metadata`, asserting the `content-addressable` core's resolved
      # dependency closure is registry-only (no path/git/workspace edges) so it
      # stays a publishable leaf (issue #13). The legitimate
      # `content-addressable-py -> content-addressable` path edge is a REVERSE
      # dep of the core and is never inside the core's forward closure, so the
      # guard tolerates it by construction.
      - name: check published core is a true leaf
        run: ./scripts/check-leaf-deps.sh

  python:
    name: python (PyO3 face)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build the extension and run pytest
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin pytest blake3
          maturin develop -m content-addressable-py/Cargo.toml
          pytest -q
