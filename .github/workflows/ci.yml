# HOOK PARITY: the cargo fmt/clippy/test jobs are mirrored by .githooks/pre-push.
# When editing those, update the push hook to match. The build/test/clippy jobs
# run with `--all-features` so the default-OFF `merkle` feature
# (src/merkle.rs / MerkleNode) is actually compiled and tested; the `test` job
# additionally runs a plain `cargo test` to keep the default-feature surface
# green and to prove `merkle` stays off by default. The `python` job below
# (maturin + pytest for the PyO3 face) is CI-ONLY by design — building the
# extension module is too heavy for a fast pre-push hook — so it is a documented
# exception, the same pattern kyln uses to keep its p4d suite out of the hook.
# The pre-push hook records this exception in its header.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build
        run: cargo build --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (default features — proves merkle stays off)
        run: cargo test
      - name: cargo test --all-features (exercises the merkle feature)
        run: cargo test --all-features

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt -- --check

  python:
    name: python (PyO3 face)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build the extension and run pytest
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip maturin pytest blake3
          maturin develop -m content-addressable-py/Cargo.toml
          pytest -q
